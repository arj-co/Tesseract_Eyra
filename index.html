<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eyra - Your Eyes Are Your Voice</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- WebGazer (local) -->
    <script src="/vendor/webgazer.js"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              medicalBlue: '#1A73E8',
              deepNavy: '#0D47A1',
              softGreen: '#34A853',
              vividBlue: '#2563eb',
              bgAlternate: '#F8F9FA',
              textPrimary: '#1C1C1E',
              textMuted: '#6B7280',
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              serif: ['"Playfair Display"', 'serif'],
            },
            boxShadow: {
              subtle: '0 2px 8px rgba(0,0,0,0.08)'
            }
          }
        }
      }
    </script>
    <style>
      @keyframes breathe {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      .dot-grid {
        position: fixed;
        top: -10%; left: -10%;
        width: 120%; height: 120%;
        background-image: radial-gradient(#e0e8f0 2px, transparent 2px);
        background-size: 24px 24px;
        animation: breathe 8s ease-in-out infinite;
        z-index: -1;
        pointer-events: none;
      }
      @keyframes shimmer {
        from { background-position: 200% center; }
        to { background-position: -200% center; }
      }
      .animate-shimmer {
        background: linear-gradient(90deg, #9CA3AF 25%, #4B5563 50%, #9CA3AF 75%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 10px rgba(37,99,235,0.4); transform: scale(1); }
        50% { box-shadow: 0 0 25px rgba(37,99,235,0.7); transform: scale(1.02); }
      }
      .animate-pulse-glow {
        animation: pulse-glow 3s infinite ease-in-out;
      }
      @keyframes blink {
        0%, 96%, 100% { transform: scaleY(1); }
        98% { transform: scaleY(0.1); }
      }
      .animate-blink {
        transform-origin: center;
        animation: blink 4s infinite;
      }
    </style>
  </head>
  <body class="bg-white text-textPrimary font-sans antialiased">
    <div class="dot-grid"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
